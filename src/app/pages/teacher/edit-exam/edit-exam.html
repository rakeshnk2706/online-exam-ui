<app-navbar></app-navbar>

<div class="layout">
  <app-sidebar></app-sidebar>

  <div class="content">
    <div class="exam-container">
      <h2>Edit Exam</h2>

      <div *ngIf="loading" class="loading">Loading exam...</div>

      <div *ngIf="!loading">
        <div class="form-group">
          <label>Exam Name</label>
          <input type="text" [(ngModel)]="exam.examName" />
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea rows="4" [(ngModel)]="exam.description"> </textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Class</label>
            <input type="text" [(ngModel)]="exam.className" />
          </div>

          <div class="form-group">
            <label>Status</label>
            <select [(ngModel)]="exam.status">
              <option value="ACTIVE">ACTIVE</option>
              <option value="INACTIVE">INACTIVE</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Duration Minutes</label>
            <input type="number" [(ngModel)]="exam.durationMinutes" />
          </div>

          <div class="form-group">
            <label>Total Marks</label>
            <input type="number" [(ngModel)]="exam.totalMarks" (ngModelChange)="validateExam()" />
          </div>

          <div class="form-group">
            <label>Question Count</label>
            <input
              type="number"
              [(ngModel)]="exam.questionCount"
              (ngModelChange)="validateExam()"
            />
          </div>
        </div>

        <div class="validation-error" *ngIf="validationMessage">
          {{ validationMessage }}
        </div>

        <div class="info-box" *ngIf="!validationMessage && exam.totalMarks && exam.questionCount">
          Each question will carry
          <strong>{{ exam.totalMarks / exam.questionCount }}</strong>
          marks.
        </div>

        <div class="actions">
          <button class="save-btn" (click)="updateExam()" [disabled]="validationMessage">
            Update Exam
          </button>

          <button class="cancel-btn" (click)="cancel()">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</div>
