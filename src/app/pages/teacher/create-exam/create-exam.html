<app-navbar></app-navbar>

<div class="container">
  <app-sidebar></app-sidebar>

  <div class="content">
    <div class="exam-container">
      <h2>Create Exam</h2>

      <div class="form-group">
        <label>Exam Name</label>
        <input type="text" [(ngModel)]="exam.examName" />
        <small class="error" *ngIf="fieldErrors.examName">
          {{ fieldErrors.examName }}
        </small>
      </div>
      <div class="form-group">
        <label>Class</label>

        <input type="text" [(ngModel)]="exam.className" placeholder="Example: 10" />
        <small class="error" *ngIf="fieldErrors.className">
          {{ fieldErrors.className }}
        </small>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea rows="4" [(ngModel)]="exam.description"> </textarea>
      </div>

      <div class="form-group">
        <label>Duration (Minutes)</label>
        <input type="number" [(ngModel)]="exam.durationMinutes" />
        <small class="error" *ngIf="fieldErrors.durationMinutes">
          {{ fieldErrors.durationMinutes }}
        </small>
      </div>

      <div class="form-group">
        <label>Total Marks</label>
        <input type="number" [(ngModel)]="exam.totalMarks" (ngModelChange)="validateExam()" />
        <small class="error" *ngIf="fieldErrors.totalMarks">
          {{ fieldErrors.totalMarks }}
        </small>
      </div>
      <div class="form-group">

        <label>Question Count</label>

        <input type="number" [(ngModel)]="exam.questionCount" (ngModelChange)="validateExam()" placeholder="Example: 10">
        <small class="error" *ngIf="fieldErrors.questionCount">
          {{ fieldErrors.questionCount }}
        </small>
      </div>

      <div class="validation-error" *ngIf="validationMessage">

        {{ validationMessage }}

      </div>

      <div class="info-box" *ngIf="!validationMessage && exam.totalMarks && exam.questionCount">

        Each question will carry
        <strong>
          {{ exam.totalMarks / exam.questionCount }}
        </strong>
        marks.

      </div>

      <button class="btn-create" (click)="createExam()" [disabled]="validationMessage">
        Create Exam
      </button>
    </div>
  </div>
</div>
